spring:
  application:
    name: satellite-annotation-backend

  profiles:
    active: dev

  # 数据库配置
  datasource:
    url: jdbc:postgresql://192.168.200.77:5432/satellite_annotation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 服务器配置
server:
  port: 4000

# JWT 配置
jwt:
  secret: satellite-annotation-system-secret-key-must-be-changed-in-production
  expiration: 86400000  # 24 小时

# 影像配置
image:
  upload-dir: uploads/images/
  tile-dir: uploads/tiles/
  max-size: 1073741824  # 1GB

# 日志配置
logging:
  level:
    root: INFO
    com.annotation: DEBUG
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://192.168.200.77:5432/satellite_annotation
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET:satellite-annotation-system-secret-key-must-be-changed-in-production}

image:
  upload-dir: /opt/uploads/images/
  tile-dir: /opt/uploads/tiles/

server:
  port: 4000
  address: 0.0.0.0

logging:
  level:
    root: INFO
    com.annotation: DEBUG
    org.springframework.security: DEBUG

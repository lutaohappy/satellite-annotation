# Nginx 缓存修复配置
# 替换 /opt/nginx/nginx.conf 中的 location /gis/ 块

# 原来的配置：
# location /gis/ {
#     alias /opt/html/;
#     index index.html;
#     try_files $uri $uri/ /gis/index.html;
# }

# 修改为：
location /gis/ {
    alias /opt/html/;
    index index.html;
    try_files $uri $uri/ /gis/index.html;

    # 禁用浏览器缓存
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    add_header X-Accel-Expires "0";
}

# 为静态资源也禁用缓存（可选，因为文件名带 hash）
location ~* ^/gis/assets/.*\.(js|css)$ {
    alias /opt/html/assets/;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}
